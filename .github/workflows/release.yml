name: Release KutukDPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Surum etiketi (ornek: v0.2.0)'
        required: true
        default: 'v0.2.0'

permissions:
  contents: write

env:
  WINDIVERT_URL: https://reqrypt.org/download/WinDivert-2.2.0-D.zip
  WINDIVERT_NAME: WinDivert-2.2.0-D.zip
  WINDIVERT_BASENAME: WinDivert-2.2.0-D
  WINDIVERT_SHA256: 1d461cfdfa7ba88ebcfbb3603b71b703e9f72aba8aeff99a75ce293e6f89d2ba

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Install MinGW-w64
        run: |
          sudo rm -f /var/lib/man-db/auto-update
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-mingw-w64

      - name: Download WinDivert
        run: |
          wget -O ${{ env.WINDIVERT_NAME }} ${{ env.WINDIVERT_URL }}
          echo ${{ env.WINDIVERT_SHA256 }} ${{ env.WINDIVERT_NAME }} | sha256sum -c
          unzip -q ${{ env.WINDIVERT_NAME }}

      - name: Compile x86_64
        run: |
          cd src
          make clean
          make CPREFIX=x86_64-w64-mingw32- BIT64=1 \
            WINDIVERTHEADERS=../${{ env.WINDIVERT_BASENAME }}/include \
            WINDIVERTLIBS=../${{ env.WINDIVERT_BASENAME }}/x64 -j4

      - name: Package release
        run: |
          mkdir -p release/x86_64
          cp src/kutukdpi.exe ${{ env.WINDIVERT_BASENAME }}/x64/WinDivert.dll ${{ env.WINDIVERT_BASENAME }}/x64/WinDivert64.sys release/x86_64/
          cp -r profiller lists release/
          cp HIZMET_KUR.cmd HIZMET_KALDIR.cmd discord_temizle.cmd _setup.cmd _hizmet_install.cmd KURULUM.txt DISCORD.txt ISP.txt PAYLASIM.txt README.md LICENSE CREDITS.md release/
          cd release && zip -r ../KutukDPI-Turkiye-x86_64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: KutukDPI Turkiye ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: KutukDPI-Turkiye-x86_64.zip
          body: |
            ## Kurulum
            1. ZIP'i indir ve `C:\KutukDPI\` gibi sabit yere ac
            2. `HIZMET_KUR.cmd` calistir, internet saglayicini sec
            3. Detay: KURULUM.txt ve ISP.txt

            ## Uyarilar
            - Yonetici yetkisi gerekir
            - Klasoru tasimayin
            - Vodafone'da Discord uygulamasi her zaman acilmayabilir
