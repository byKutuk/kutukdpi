name: Build KutukDPI

on:
  push:
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
      - '*.cmd'
  pull_request:
    paths:
      - 'src/**'
  workflow_dispatch:

env:
  WINDIVERT_URL: https://reqrypt.org/download/WinDivert-2.2.0-D.zip
  WINDIVERT_NAME: WinDivert-2.2.0-D.zip
  WINDIVERT_BASENAME: WinDivert-2.2.0-D
  WINDIVERT_SHA256: 1d461cfdfa7ba88ebcfbb3603b71b703e9f72aba8aeff99a75ce293e6f89d2ba
  BYEDPI_URL: https://github.com/hufrea/byedpi/releases/download/v0.17.3/byedpi-17.3-x86_64-w64.zip
  DROVER_URL: https://github.com/hdrover/discord-drover/releases/download/v0.9/drover-v0.9.zip

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Declare short commit variable
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install MinGW-w64
        run: |
          sudo rm -f /var/lib/man-db/auto-update
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-mingw-w64

      - name: Download WinDivert from cache
        id: windivert-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.WINDIVERT_NAME }}
          key: ${{ env.WINDIVERT_SHA256 }}

      - name: Download WinDivert from the website
        if: steps.windivert-cache.outputs.cache-hit != 'true'
        run: >
          wget ${{ env.WINDIVERT_URL }} &&
          (echo ${{ env.WINDIVERT_SHA256 }} ${{ env.WINDIVERT_NAME }} | sha256sum -c)

      - name: Unpack WinDivert
        run: unzip ${{ env.WINDIVERT_NAME }}

      - name: Download ByeDPI and drover
        run: |
          wget -O byedpi.zip ${{ env.BYEDPI_URL }}
          wget -O drover.zip ${{ env.DROVER_URL }}
          unzip -q byedpi.zip -d byedpi-extract
          unzip -q drover.zip -d drover-extract

      - name: Compile x86_64
        run: |
          cd src
          make clean
          make CPREFIX=x86_64-w64-mingw32- BIT64=1 \
            WINDIVERTHEADERS=../${{ env.WINDIVERT_BASENAME }}/include \
            WINDIVERTLIBS=../${{ env.WINDIVERT_BASENAME }}/x64 -j4

      - name: Prepare release directory
        run: |
          mkdir -p release/x86_64 release/byedpi release/drover
          cp src/kutukdpi.exe ${{ env.WINDIVERT_BASENAME }}/x64/WinDivert.dll ${{ env.WINDIVERT_BASENAME }}/x64/WinDivert64.sys release/x86_64/
          find byedpi-extract -name ciadpi.exe -exec cp {} release/byedpi/ \;
          cp drover-extract/version.dll drover-extract/d3d11.dll release/drover/ 2>/dev/null || cp drover-extract/*/version.dll release/drover/
          cp drover-extract/d3d11.dll release/drover/ 2>/dev/null || cp drover-extract/*/d3d11.dll release/drover/ 2>/dev/null || true
          cp HIZMET_KUR.cmd HIZMET_KALDIR.cmd discord_temizle.cmd _setup.cmd _discord_drover.cmd KURULUM.txt DISCORD.txt README.md LICENSE CREDITS.md release/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: kutukdpi_x86_64_${{ steps.vars.outputs.sha_short }}
          path: release/
