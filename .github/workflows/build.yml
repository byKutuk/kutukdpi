name: Build KutukDPI

on:
  push:
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'src/**'
  workflow_dispatch:

env:
  WINDIVERT_URL: https://reqrypt.org/download/WinDivert-2.2.0-A.zip
  WINDIVERT_NAME: WinDivert-2.2.0-A.zip
  WINDIVERT_BASENAME: WinDivert-2.2.0-A

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Declare short commit variable
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install MinGW-w64
        run: |
          sudo rm /var/lib/man-db/auto-update
          sudo DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends gcc-mingw-w64

      - name: Download WinDivert
        run: wget ${{ env.WINDIVERT_URL }}

      - name: Unpack WinDivert
        run: unzip ${{ env.WINDIVERT_NAME }}

      - name: Compile x86_64
        run: |
          cd src && make clean
          make CPREFIX=x86_64-w64-mingw32- BIT64=1 \
            WINDIVERTHEADERS=../${{ env.WINDIVERT_BASENAME }}/include \
            WINDIVERTLIBS=../${{ env.WINDIVERT_BASENAME }}/x64 -j4

      - name: Prepare release directory
        run: |
          mkdir -p release/x86_64 release/lists
          cp src/kutukdpi.exe ${{ env.WINDIVERT_BASENAME }}/x64/WinDivert.dll ${{ env.WINDIVERT_BASENAME }}/x64/WinDivert64.sys release/x86_64/
          cp lists/discord.txt release/lists/
          cp vodafone_discord*.cmd service_*.cmd release/
          cp README.md LICENSE CREDITS.md release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kutukdpi_x86_64_${{ steps.vars.outputs.sha_short }}
          path: release/
